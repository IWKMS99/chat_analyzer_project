services:
  api:
    image: ${API_IMAGE:-ghcr.io/IWKMS99/chat-analyzer-api:latest}
    environment:
      APP_NAME: chat-analyzer-api
      APP_VERSION: ${APP_VERSION:-0.1.0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-104857600}
      SQLITE_PATH: ${SQLITE_PATH:-/app/backend_data/analyses.db}
      STORAGE_BASE_DIR: ${STORAGE_BASE_DIR:-/app/backend_data}
      TASK_WORKERS: ${TASK_WORKERS:-1}
      TASK_TTL_SECONDS: ${TASK_TTL_SECONDS:-604800}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-600}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      CHAT_ANALYZER_FALLBACK_JSON_MAX_BYTES: ${CHAT_ANALYZER_FALLBACK_JSON_MAX_BYTES:-52428800}
      CHAT_ANALYZER_NLP_WORKERS: ${CHAT_ANALYZER_NLP_WORKERS:-1}
    volumes:
      - backend_data:/app/backend_data

  web:
    image: ${WEB_IMAGE:-ghcr.io/IWKMS99/chat-analyzer-web:latest}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  backend_data:
