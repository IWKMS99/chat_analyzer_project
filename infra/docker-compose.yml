services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: chat-analyzer-api
      APP_VERSION: 2.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-104857600}
      SQLITE_PATH: ${SQLITE_PATH:-/app/backend_data/analyses.db}
      STORAGE_BASE_DIR: /app/backend_data
      TASK_WORKERS: ${TASK_WORKERS:-1}
      TASK_TTL_SECONDS: ${TASK_TTL_SECONDS:-604800}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-600}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      CHAT_ANALYZER_FALLBACK_JSON_MAX_BYTES: ${CHAT_ANALYZER_FALLBACK_JSON_MAX_BYTES:-52428800}
    volumes:
      - backend_data:/app/backend_data
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic -c apps/api/alembic.ini upgrade head &&
      uv run uvicorn chat_analyzer_api.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  backend_data:
