services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: chat-analyzer-api
      APP_VERSION: 2.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-104857600}
      SQLITE_PATH: ${SQLITE_PATH:-/app/backend_data/analyses.db}
      STORAGE_BASE_DIR: /app/backend_data
      TASK_WORKERS: ${TASK_WORKERS:-1}
      TASK_TTL_SECONDS: ${TASK_TTL_SECONDS:-604800}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-600}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      - backend_data:/app/backend_data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v2}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  backend_data:
